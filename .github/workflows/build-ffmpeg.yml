name: Build FFmpeg and APK

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-ffmpeg:
    name: Build FFmpeg from Source
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    
    steps:
    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y build-essential yasm nasm cmake git curl wget pkg-config \
          libx264-dev libx265-dev libvpx-dev libopus-dev libvorbis-dev \
          libmp3lame-dev libaacplus-dev libass-dev libfreetype6-dev \
          libfribidi-dev libtheora-dev libwavpack-dev libspeex-dev \
          libflac-dev libopenjpeg-dev libwebp-dev
    
    - name: Download FFmpeg source
      run: |
        cd /tmp
        wget -O ffmpeg-6.0.tar.xz https://ffmpeg.org/releases/ffmpeg-6.0.tar.xz
        tar -xf ffmpeg-6.0.tar.xz
    
    - name: Build for ARM64
      run: |
        cd /tmp/ffmpeg-6.0
        ./configure \
          --prefix=/tmp/ffmpeg-build/arm64-v8a \
          --enable-cross-compile \
          --cross-prefix=aarch64-linux-gnu- \
          --target-os=android \
          --arch=aarch64 \
          --cpu=armv8 \
          --enable-neon \
          --enable-gpl \
          --enable-version3 \
          --disable-doc \
          --disable-programs \
          --disable-static \
          --enable-shared \
          --enable-small \
          --disable-debug \
          --disable-x86asm \
          --enable-libx264 \
          --enable-libx265 \
          --enable-libvpx \
          --enable-libopus \
          --enable-libvorbis \
          --enable-libmp3lame \
          --enable-libaacplus \
          --enable-libass \
          --enable-libfreetype
        
        make -j$(nproc)
        make install
    
    - name: Build for ARMv7
      run: |
        cd /tmp/ffmpeg-6.0
        make clean
        ./configure \
          --prefix=/tmp/ffmpeg-build/armeabi-v7a \
          --enable-cross-compile \
          --cross-prefix=arm-linux-gnueabihf- \
          --target-os=android \
          --arch=arm \
          --cpu=armv7 \
          --enable-neon \
          --enable-gpl \
          --enable-version3 \
          --disable-doc \
          --disable-programs \
          --disable-static \
          --enable-shared \
          --enable-small \
          --disable-debug \
          --disable-x86asm \
          --enable-libx264 \
          --enable-libx265 \
          --enable-libopus \
          --enable-libvorbis \
          --enable-libmp3lame \
          --enable-libaacplus \
          --enable-libass \
          --enable-libfreetype
        
        make -j$(nproc)
        make install
    
    - name: Create archive
      run: |
        cd /tmp/ffmpeg-build
        tar -cvf ffmpeg-android.tar arm64-v8a armeabi-v7a
    
    - name: Upload FFmpeg binaries
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-android
        path: /tmp/ffmpeg-build/ffmpeg-android.tar

  build-apk:
    name: Build Android APK
    needs: build-ffmpeg
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Download FFmpeg binaries
      uses: actions/download-artifact@v4
      with:
        name: ffmpeg-android
    
    - name: Extract FFmpeg
      run: |
        tar -xvf ffmpeg-android.tar
        mkdir -p app/src/main/jniLibs
        mv arm64-v8a app/src/main/jniLibs/
        mv armeabi-v7a app/src/main/jniLibs/
    
    - name: Grant execute permission
      run: chmod +x gradlew
    
    - name: Build debug APK
      run: ./gradlew assembleDebug
    
    - name: Build release APK
      run: ./gradlew assembleRelease
    
    - name: Run tests
      run: ./gradlew test
    
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Upload release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk

  create-release:
    name: Create GitHub Release
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Download APKs
      uses: actions/download-artifact@v4
      with:
        path: apks
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: apks/debug-apk/app-debug.apk
        body: |
          ## FFmpeg Engine - Built from Source
          
          This release includes FFmpeg compiled from source with the following codecs:
          
          ### Video Codecs:
          - H.264 (libx264)
          - H.265/HEVC (libx265)
          - VP8/VP9 (libvpx)
          
          ### Audio Codecs:
          - AAC (native)
          - MP3 (libmp3lame)
          - Opus (libopus)
          - Vorbis (libvorbis)
          
          ### Installation
          1. Enable "Install from unknown sources"
          2. Install the APK
          
          ### Features
          - Full FFmpeg encoding capabilities
          - Real-time progress tracking
          - Material Design 3 UI
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
